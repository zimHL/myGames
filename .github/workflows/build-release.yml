name: Build MyGames iOS + Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "data/**"
      - "games/**"
      - "styles/**"
      - "ios/**"
      - "android/**"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Fix permissions
        run: chmod +x ios/Scripts/*.sh

      - name: Build .app
        run: ios/Scripts/build.sh

      - name: Package .tipa
        run: ios/Scripts/package.sh

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-tipa
          path: dist/MyGames.tipa

  build-android:
    runs-on: ubuntu-latest
    needs:
      - build-ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Build debug APK
        run: gradle -p android :app:assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-ios
      - build-android

    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-tipa
          path: dist/ios

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}-${{ github.run_attempt }}"
          gh release create "$TAG" \
            dist/ios/MyGames.tipa \
            dist/android/app-debug.apk \
            --repo "${{ github.repository }}" \
            --title "MyGames Build #${{ github.run_number }}" \
            --notes "自动构建 iOS 和 Android 产物。构建记录：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
