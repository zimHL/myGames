<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>滑块拼图</title>
    <style>
        :root {
            --bg: #f4efe4;
            --card: rgba(255, 251, 243, 0.92);
            --card-soft: #fff7ea;
            --line: rgba(34, 50, 56, 0.12);
            --text: #223238;
            --muted: #647379;
            --accent: #0f766e;
            --accent-strong: #0b5b55;
            --warm: #c67a20;
            --warm-soft: rgba(198, 122, 32, 0.16);
            --tile: #fffdf8;
            --tile-shadow: inset 0 0 0 1px rgba(34, 50, 56, 0.08);
            --shadow: 0 24px 48px rgba(34, 50, 56, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            padding: 20px;
            font-family: "Trebuchet MS", "Avenir Next", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(198, 122, 32, 0.14), transparent 24%),
                radial-gradient(circle at right 18% top 12%, rgba(15, 118, 110, 0.15), transparent 22%),
                linear-gradient(180deg, #f8f4ea 0%, var(--bg) 52%, #efe6d1 100%);
        }

        .page {
            width: min(100%, 760px);
            margin: 0 auto;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 30px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            padding: 24px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            background: #eef5f4;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 700;
        }

        .home-link:hover {
            background: #e2f0ee;
        }

        .header {
            margin-top: 16px;
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1,
        p {
            margin: 0;
        }

        h1 {
            font-size: clamp(2.3rem, 6vw, 3.2rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        .intro {
            margin-top: 12px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.75;
        }

        .toolbar {
            margin-top: 18px;
            padding: 16px;
            border-radius: 22px;
            background: var(--card-soft);
            border: 1px solid rgba(34, 50, 56, 0.08);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .field label {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        select,
        button {
            border: none;
            font: inherit;
        }

        select {
            width: 100%;
            min-width: 0;
            min-height: 44px;
            padding: 0 14px;
            border-radius: 14px;
            background: #fffdf8;
            color: var(--text);
            box-shadow: inset 0 0 0 1px rgba(34, 50, 56, 0.08);
            appearance: none;
        }

        .action {
            min-height: 44px;
            padding: 0 18px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.18s ease, transform 0.18s ease;
            white-space: nowrap;
        }

        .action.primary {
            background: var(--accent);
            color: #f8fbfa;
        }

        .action.primary:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        .meta-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .meta-item {
            padding: 10px 12px;
            border-radius: 16px;
            background: #fffaf0;
            border: 1px solid rgba(34, 50, 56, 0.08);
        }

        .meta-label {
            display: block;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .meta-value {
            display: block;
            margin-top: 4px;
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.3;
        }

        .status-bar {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 16px;
            background: #f8f3e8;
            border: 1px solid rgba(34, 50, 56, 0.08);
            font-size: 0.96rem;
            font-weight: 700;
        }

        .status-bar[data-state="success"] {
            background: #edf6f5;
            color: var(--accent-strong);
        }

        .status-bar[data-state="hint"] {
            background: #fff4e7;
            color: var(--warm);
        }

        .board-shell {
            margin-top: 12px;
            padding: 12px;
            border-radius: 22px;
            background: var(--card-soft);
            border: 1px solid rgba(34, 50, 56, 0.08);
            display: flex;
            justify-content: center;
        }

        .board {
            width: min(100%, 520px, calc(100vh - 260px));
            aspect-ratio: 1;
            display: grid;
            gap: 8px;
            touch-action: none;
        }

        .tile {
            border: none;
            border-radius: 18px;
            background: var(--tile);
            box-shadow: var(--tile-shadow);
            color: var(--text);
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease;
        }

        .tile:hover:not(:disabled) {
            transform: translateY(-1px);
            background: #fff8ec;
        }

        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }

        .tile.movable {
            box-shadow: inset 0 0 0 2px rgba(15, 118, 110, 0.16);
        }

        @media (max-height: 920px) and (min-width: 641px) {
            body {
                padding: 12px;
            }

            .page {
                width: min(100%, 700px);
            }

            .card {
                padding: 16px;
                border-radius: 24px;
            }

            .header {
                margin-top: 12px;
            }

            .eyebrow,
            .intro {
                display: none;
            }

            h1 {
                font-size: 2.2rem;
            }

            .toolbar {
                margin-top: 12px;
                padding: 12px;
                border-radius: 18px;
                gap: 10px;
                align-items: center;
                flex-wrap: nowrap;
            }

            .field {
                gap: 4px;
            }

            .field label {
                font-size: 0.8rem;
            }

            select {
                min-height: 40px;
                padding: 0 12px;
                font-size: 0.92rem;
            }

            .action {
                min-height: 40px;
                padding: 0 14px;
                font-size: 0.88rem;
            }

            .meta-strip {
                margin-top: 10px;
                gap: 8px;
            }

            .meta-item {
                padding: 8px 10px;
                border-radius: 14px;
            }

            .meta-label {
                font-size: 0.74rem;
            }

            .meta-value {
                font-size: 0.94rem;
            }

            .status-bar {
                margin-top: 10px;
                padding: 10px 12px;
                border-radius: 14px;
                font-size: 0.92rem;
            }

            .board-shell {
                margin-top: 10px;
                padding: 10px;
                border-radius: 18px;
            }

            .board {
                width: min(100%, 500px, calc(100vh - 200px));
                gap: 6px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 8px;
            }

            .card {
                padding: 12px;
                border-radius: 18px;
            }

            .home-link {
                min-height: 32px;
                padding: 0 12px;
                font-size: 0.82rem;
            }

            .header {
                margin-top: 10px;
            }

            .eyebrow,
            .intro {
                display: none;
            }

            h1 {
                font-size: 1.9rem;
            }

            .toolbar {
                margin-top: 12px;
                padding: 10px;
                border-radius: 16px;
                gap: 8px;
                align-items: center;
                flex-wrap: nowrap;
            }

            .field {
                gap: 4px;
            }

            .field label {
                font-size: 0.76rem;
            }

            select {
                min-height: 36px;
                padding: 0 10px;
                border-radius: 12px;
                font-size: 0.9rem;
            }

            .action {
                min-height: 36px;
                padding: 0 12px;
                border-radius: 12px;
                font-size: 0.86rem;
            }

            .meta-strip {
                margin-top: 10px;
                gap: 8px;
            }

            .meta-item {
                padding: 8px 8px;
                border-radius: 14px;
            }

            .meta-label {
                font-size: 0.72rem;
            }

            .meta-value {
                font-size: 0.9rem;
                line-height: 1.2;
            }

            .status-bar {
                margin-top: 10px;
                padding: 9px 10px;
                border-radius: 14px;
                font-size: 0.88rem;
            }

            .board-shell {
                margin-top: 10px;
                padding: 8px;
                border-radius: 16px;
            }

            .board {
                width: min(100%, calc(100vh - 220px));
                gap: 4px;
            }

            .tile {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <main class="card">
            <a class="home-link" href="../../index.html">返回首页</a>

            <header class="header">
                <p class="eyebrow">空间规划小游戏</p>
                <h1>滑块拼图</h1>
                <p class="intro">把数字方块重新排回正确顺序。可以点击空格附近的方块，也可以使用方向键或在棋盘上滑动。</p>
            </header>

            <section class="toolbar" aria-label="滑块拼图设置">
                <div class="field">
                    <label for="difficulty">挑战难度</label>
                    <select id="difficulty" aria-label="挑战难度">
                        <option value="easy">简单 3 x 3</option>
                        <option value="medium" selected>中等 4 x 4</option>
                        <option value="hard">困难 5 x 5</option>
                    </select>
                </div>
                <button class="action primary" id="restart-btn" type="button">打乱重来</button>
            </section>

            <section class="meta-strip" aria-label="当前进度">
                <div class="meta-item">
                    <span class="meta-label">棋盘大小</span>
                    <strong class="meta-value" id="size-label">4 x 4</strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">已移动次数</span>
                    <strong class="meta-value" id="move-count">0</strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">目标</span>
                    <strong class="meta-value">恢复正确顺序</strong>
                </div>
            </section>

            <div class="status-bar" id="status-bar" data-state="hint" aria-live="polite"></div>

            <section class="board-shell">
                <div class="board" id="board" aria-label="滑块拼图棋盘"></div>
            </section>
        </main>
    </div>

    <script>
        const DIFFICULTY_CONFIGS = {
            easy: {
                label: "3 x 3",
                size: 3
            },
            medium: {
                label: "4 x 4",
                size: 4
            },
            hard: {
                label: "5 x 5",
                size: 5
            }
        };

        const difficultyElement = document.getElementById("difficulty");
        const restartButton = document.getElementById("restart-btn");
        const boardElement = document.getElementById("board");
        const sizeLabelElement = document.getElementById("size-label");
        const moveCountElement = document.getElementById("move-count");
        const statusBarElement = document.getElementById("status-bar");

        const state = {
            difficulty: "medium",
            size: 4,
            tiles: [],
            moves: 0,
            won: false,
            touchStartX: 0,
            touchStartY: 0
        };

        function getCurrentConfig() {
            return DIFFICULTY_CONFIGS[state.difficulty] || DIFFICULTY_CONFIGS.medium;
        }

        function createSolvedTiles(size) {
            return Array.from({ length: size * size }, (_, index) => {
                if (index === size * size - 1) {
                    return 0;
                }
                return index + 1;
            });
        }

        function shuffleArray(items) {
            const shuffled = [...items];

            for (let index = shuffled.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
            }

            return shuffled;
        }

        function countInversions(tiles) {
            let inversions = 0;

            for (let left = 0; left < tiles.length; left += 1) {
                if (tiles[left] === 0) {
                    continue;
                }

                for (let right = left + 1; right < tiles.length; right += 1) {
                    if (tiles[right] !== 0 && tiles[left] > tiles[right]) {
                        inversions += 1;
                    }
                }
            }

            return inversions;
        }

        function isSolved(tiles) {
            return tiles.every((value, index) => {
                if (index === tiles.length - 1) {
                    return value === 0;
                }
                return value === index + 1;
            });
        }

        function isSolvable(tiles, size) {
            const inversions = countInversions(tiles);

            if (size % 2 === 1) {
                return inversions % 2 === 0;
            }

            const blankIndex = tiles.indexOf(0);
            const blankRowFromBottom = size - Math.floor(blankIndex / size);

            if (blankRowFromBottom % 2 === 0) {
                return inversions % 2 === 1;
            }

            return inversions % 2 === 0;
        }

        function createShuffledTiles(size) {
            const solved = createSolvedTiles(size);
            let shuffled = solved;

            do {
                shuffled = shuffleArray(solved);
            } while (!isSolvable(shuffled, size) || isSolved(shuffled));

            return shuffled;
        }

        function getBlankIndex() {
            return state.tiles.indexOf(0);
        }

        function isAdjacent(firstIndex, secondIndex) {
            const firstRow = Math.floor(firstIndex / state.size);
            const firstCol = firstIndex % state.size;
            const secondRow = Math.floor(secondIndex / state.size);
            const secondCol = secondIndex % state.size;
            const distance = Math.abs(firstRow - secondRow) + Math.abs(firstCol - secondCol);
            return distance === 1;
        }

        function getMovableIndices() {
            const blankIndex = getBlankIndex();
            return state.tiles
                .map((_, index) => index)
                .filter((index) => isAdjacent(index, blankIndex));
        }

        function updateMeta() {
            sizeLabelElement.textContent = `${state.size} x ${state.size}`;
            moveCountElement.textContent = String(state.moves);
        }

        function setStatus(message, stateName) {
            statusBarElement.textContent = message;
            statusBarElement.dataset.state = stateName || "hint";
        }

        function renderBoard() {
            boardElement.innerHTML = "";
            boardElement.style.gridTemplateColumns = `repeat(${state.size}, minmax(0, 1fr))`;

            const movableLookup = new Set(getMovableIndices());

            state.tiles.forEach((value, index) => {
                const tileButton = document.createElement("button");
                tileButton.type = "button";
                tileButton.className = "tile";
                tileButton.style.fontSize = state.size >= 5 ? "1.1rem" : (state.size === 4 ? "1.4rem" : "1.8rem");

                if (value === 0) {
                    tileButton.classList.add("empty");
                    tileButton.disabled = true;
                    tileButton.setAttribute("aria-label", "空白格");
                } else {
                    tileButton.textContent = String(value);
                    tileButton.disabled = state.won || !movableLookup.has(index);
                    tileButton.classList.toggle("movable", movableLookup.has(index));
                    tileButton.setAttribute("aria-label", `数字 ${value}`);
                    tileButton.addEventListener("click", () => moveTile(index));
                }

                boardElement.appendChild(tileButton);
            });

            updateMeta();
        }

        function resetGame() {
            const config = getCurrentConfig();
            state.size = config.size;
            state.tiles = createShuffledTiles(config.size);
            state.moves = 0;
            state.won = false;

            renderBoard();
            setStatus("点击空白格旁边的数字，把顺序慢慢拼回来。", "hint");
        }

        function moveTile(index) {
            if (state.won) {
                return;
            }

            const blankIndex = getBlankIndex();
            if (!isAdjacent(index, blankIndex)) {
                return;
            }

            [state.tiles[index], state.tiles[blankIndex]] = [state.tiles[blankIndex], state.tiles[index]];
            state.moves += 1;
            renderBoard();

            if (isSolved(state.tiles)) {
                state.won = true;
                renderBoard();
                setStatus(`拼好了，一共用了 ${state.moves} 步。`, "success");
                return;
            }

            setStatus("继续移动，把数字按顺序排好。", "hint");
        }

        function moveBlankByDirection(deltaRow, deltaCol) {
            const blankIndex = getBlankIndex();
            const blankRow = Math.floor(blankIndex / state.size);
            const blankCol = blankIndex % state.size;
            const targetRow = blankRow + deltaRow;
            const targetCol = blankCol + deltaCol;

            if (targetRow < 0 || targetRow >= state.size || targetCol < 0 || targetCol >= state.size) {
                return;
            }

            const targetIndex = targetRow * state.size + targetCol;
            moveTile(targetIndex);
        }

        function handleKeydown(event) {
            const key = event.key.toLowerCase();

            if (key === "arrowup" || key === "w") {
                event.preventDefault();
                moveBlankByDirection(1, 0);
            } else if (key === "arrowdown" || key === "s") {
                event.preventDefault();
                moveBlankByDirection(-1, 0);
            } else if (key === "arrowleft" || key === "a") {
                event.preventDefault();
                moveBlankByDirection(0, 1);
            } else if (key === "arrowright" || key === "d") {
                event.preventDefault();
                moveBlankByDirection(0, -1);
            }
        }

        function handleTouchStart(event) {
            const touch = event.changedTouches[0];
            state.touchStartX = touch.clientX;
            state.touchStartY = touch.clientY;
        }

        function handleTouchEnd(event) {
            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - state.touchStartX;
            const deltaY = touch.clientY - state.touchStartY;

            if (Math.abs(deltaX) < 18 && Math.abs(deltaY) < 18) {
                return;
            }

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                moveBlankByDirection(0, deltaX > 0 ? -1 : 1);
            } else {
                moveBlankByDirection(deltaY > 0 ? -1 : 1, 0);
            }
        }

        difficultyElement.addEventListener("change", () => {
            state.difficulty = difficultyElement.value;
            resetGame();
        });

        restartButton.addEventListener("click", resetGame);
        boardElement.addEventListener("touchstart", handleTouchStart, { passive: true });
        boardElement.addEventListener("touchend", handleTouchEnd, { passive: true });
        window.addEventListener("keydown", handleKeydown);

        resetGame();
    </script>
</body>
</html>
