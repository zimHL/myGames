<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑力游戏小站</title>
    <link rel="stylesheet" href="./styles/home.css">
    <style>
        .hero {
            display: block;
            margin-bottom: 28px;
        }

        .hero-copy {
            padding: 40px 36px;
        }

        .hero-text {
            font-size: 1.08rem;
            line-height: 1.9;
        }

        @media (max-width: 820px) {
            .hero {
                margin-bottom: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <div class="hero-copy">
                <p class="eyebrow">儿童益智小游戏合集</p>
                <h1>脑力游戏小站</h1>
                <p class="hero-text">
                    在轻松有趣的小游戏里，陪孩子慢慢练习观察、推理与专注。
                    每一次点击都是一次思考，每完成一局，都会积累一点小小的成长。
                </p>
                <div class="hero-meta">
                    <span id="game-count">0 个游戏</span>
                    <span>适合亲子共玩</span>
                    <span>持续更新中</span>
                </div>
            </div>
        </header>

        <main class="hall">
            <section class="hall-header">
                <div>
                    <p class="section-kicker">游戏大厅</p>
                    <h2>已接入的游戏</h2>
                </div>
                <p class="section-note">点击卡片即可进入。</p>
            </section>
            <section id="game-list" class="game-grid" aria-label="游戏列表"></section>
        </main>
    </div>

    <script src="./data/games.js"></script>
    <script>
        const gameList = Array.isArray(window.GAME_LIST) ? window.GAME_LIST : [];
        const gameListElement = document.getElementById("game-list");
        const gameCountElement = document.getElementById("game-count");

        function createTagList(tags) {
            return tags.map((tag) => `<span class="tag">${tag}</span>`).join("");
        }

        function renderGameList(games) {
            if (!games.length) {
                gameListElement.innerHTML = `
                    <article class="game-card empty-card">
                        <p class="empty-title">还没有可展示的游戏</p>
                        <p class="empty-desc">先在 data/games.js 里增加一条配置，再补对应目录。</p>
                    </article>
                `;
                return;
            }

            gameListElement.innerHTML = games.map((game) => `
                <article class="game-card">
                    <div class="card-top">
                        <span class="card-status">${game.status}</span>
                        <span class="card-difficulty">${game.difficulty}</span>
                    </div>
                    <h3>${game.title}</h3>
                    <p class="card-summary">${game.summary}</p>
                    <div class="tag-list">${createTagList(game.tags)}</div>
                    <div class="card-footer">
                        <span class="age-label">${game.age}</span>
                        <a class="enter-link" href="${game.href}">进入游戏</a>
                    </div>
                </article>
            `).join("");
        }

        gameCountElement.textContent = `${gameList.length} 个游戏`;
        renderGameList(gameList);
    </script>
</body>
</html>
