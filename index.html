<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑力游戏小站</title>
    <link rel="stylesheet" href="./styles/home.css">
</head>
<body>
    <div class="page-shell">
        <main class="hall">
            <section class="hall-header">
                <div>
                    <p class="section-kicker">游戏大厅</p>
                    <h2 id="game-count-title">共 0 个游戏</h2>
                </div>
                <p class="section-note">点击卡片即可进入。</p>
            </section>
            <section id="game-list" class="game-grid" aria-label="游戏列表"></section>
        </main>
    </div>

    <script src="./data/games.js"></script>
    <script>
        const gameList = Array.isArray(window.GAME_LIST) ? window.GAME_LIST : [];
        const gameListElement = document.getElementById("game-list");
        const gameCountElement = document.getElementById("game-count-title");

        function createTagList(tags) {
            return tags.map((tag) => `<span class="tag">${tag}</span>`).join("");
        }

        function renderGameList(games) {
            if (!games.length) {
                gameListElement.innerHTML = `
                    <article class="game-card empty-card">
                        <p class="empty-title">还没有可展示的游戏</p>
                        <p class="empty-desc">先在 data/games.js 里增加一条配置，再补对应目录。</p>
                    </article>
                `;
                return;
            }

            gameListElement.innerHTML = games.map((game) => `
                <article class="game-card">
                    <div class="card-top">
                        <span class="card-status">${game.status}</span>
                        <span class="card-difficulty">${game.difficulty}</span>
                    </div>
                    <h3>${game.title}</h3>
                    <p class="card-summary">${game.summary}</p>
                    <div class="tag-list">${createTagList(game.tags)}</div>
                    <div class="card-footer">
                        <span class="age-label">${game.age}</span>
                        <a class="enter-link" href="${game.href}">进入游戏</a>
                    </div>
                </article>
            `).join("");
        }

        gameCountElement.textContent = `共 ${gameList.length} 个游戏`;
        renderGameList(gameList);
    </script>
</body>
</html>
